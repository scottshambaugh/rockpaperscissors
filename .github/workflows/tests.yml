name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    # The full suite includes the slow cold-cache enumerations (n=6/n=8), ~5-6 min;
    # cap the job so a runaway enumeration can't hang CI.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # mplcairo is a declared dependency and may build from source on Python 3.14;
      # give it the cairo/freetype headers it needs.
      - name: Install system build deps
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype-dev pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (uv provisions Python 3.14)
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      # Full suite, including the `slow` large-enumeration validations (e.g.
      # inclusive n=6, two-paradox n=8). Use `-m "not slow"` for a quick subset.
      - name: Run tests
        run: uv run pytest -q --durations=10

  # Build the nauty-FFI Rust census tools (rust/balanced.rs, rust/regular.rs) and
  # check them against known small-n (total, twin-free, prime) counts + shard-sum.
  rust:
    # noble (24.04) renamed the nauty dev package libnauty2-dev -> libnauty-dev
    # (nauty 2.8); older Ubuntu/Debian use libnauty2-dev. Try both, then fall back to
    # a source build so the job self-heals on any runner.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install nauty (headers + lib)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl
          if ! sudo apt-get install -y libnauty-dev && ! sudo apt-get install -y libnauty2-dev; then
            echo "::warning::no nauty dev package — building from source"
            curl -fL https://pallini.di.uniroma1.it/nauty2_8_8.tar.gz -o /tmp/nauty.tgz
            tar -xzf /tmp/nauty.tgz -C /tmp
            cd /tmp/nauty2_8_8
            ./configure
            make -j2 nauty.a || make -j2
            sudo install -m644 nauty.h /usr/local/include/
            a=$(ls nauty.a libnauty.a 2>/dev/null | head -1)
            sudo install -m644 "$a" /usr/local/lib/libnauty.a
            sudo ldconfig
          fi

      - name: Ensure a Rust compiler
        run: rustc --version || rustup default stable

      - name: Build + check Rust census tools
        run: bash rust/ci_test.sh
