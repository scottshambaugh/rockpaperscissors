name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    # The full suite includes the slow cold-cache enumerations (n=6/n=8), ~5-6 min;
    # cap the job so a runaway enumeration can't hang CI.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # mplcairo is a declared dependency and may build from source on Python 3.14;
      # give it the cairo/freetype headers it needs.
      - name: Install system build deps
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype-dev pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (uv provisions Python 3.14)
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      # Full suite, including the `slow` large-enumeration validations (e.g.
      # inclusive n=6, two-paradox n=8). Use `-m "not slow"` for a quick subset.
      - name: Run tests
        run: uv run pytest -q --durations=10

  # Build the nauty-FFI Rust census tools (rust/balanced.rs, rust/regular.rs) and
  # check them against known small-n (total, twin-free, prime) counts + shard-sum.
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install nauty headers + build tools
        run: sudo apt-get update && sudo apt-get install -y libnauty2-dev build-essential

      - name: Ensure a Rust compiler
        run: rustc --version || rustup default stable

      - name: Build + check Rust census tools
        run: bash rust/ci_test.sh
